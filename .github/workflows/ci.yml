name: API Test Automation — CI/CD Pipeline

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:    

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: read
  checks: write        
  pull-requests: write 
  packages: write      

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  api-tests:
    name: Run API Tests (JUnit 5)
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Run tests
      - name: Run API tests
        id: run-tests
        run: |
          mvn test \
            -Dmaven.test.failure.ignore=true \
            --batch-mode \
            --no-transfer-progress

      # 5. Robust parsing of surefire XML results
      - name: Parse test results
        if: always()
        id: parse-results
        run: |
          python3 << 'PYEOF'
          import os, glob, xml.etree.ElementTree as ET
          
          total, passed, failed, skipped, errors = 0, 0, 0, 0, 0
          files = glob.glob("target/surefire-reports/TEST-*.xml")
          
          for f in files:
              try:
                  tree = ET.parse(f)
                  root = tree.getroot()
                  total   += int(root.get("tests", 0))
                  failed  += int(root.get("failures", 0))
                  errors  += int(root.get("errors", 0))
                  skipped += int(root.get("skipped", 0))
              except Exception as e:
                  print(f"Error parsing {f}: {e}")
          
          p_count = total - failed - errors - skipped
          f_total = failed + errors
          pass_pct = int((p_count / total) * 100) if total > 0 else 0
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"total={total}\n")
              out.write(f"passed={p_count}\n")
              out.write(f"failed={f_total}\n")
              out.write(f"skipped={skipped}\n")
              out.write(f"pass_pct={pass_pct}\n")
          PYEOF

      # 6. Publish JUnit 5 test results as GitHub Check
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/**/*.xml
          check_name: "API Test Results"
          comment_on_pr: true
          fail_on: "test failures"

      # 7. Generate Allure Report
      - name: Generate Allure Report
        run: mvn allure:report
        if: always()

      # 8. Upload Allure Report as artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/

      # 9. Upload Surefire reports as downloadable artifact
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 14

      # 10. Email Notification (Rich HTML)
      - name: Send email report
        if: always()
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:      ${{ secrets.REPORT_EMAIL }}
        run: |
          python3 << 'PYEOF'
          import os, smtplib, json, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          gmail_user = os.environ["GMAIL_ADDRESS"]
          gmail_pass = os.environ["GMAIL_APP_PASS"]
          report_to  = os.environ["REPORT_TO"]

          total    = "${{ steps.parse-results.outputs.total }}"    or "0"
          passed   = "${{ steps.parse-results.outputs.passed }}"   or "0"
          failed   = "${{ steps.parse-results.outputs.failed }}"   or "0"
          skipped  = "${{ steps.parse-results.outputs.skipped }}"  or "0"
          pass_pct = "${{ steps.parse-results.outputs.pass_pct }}" or "0"
          
          failing_tests = []
          for json_file in sorted(glob.glob("target/allure-results/*-result.json")):
              try:
                  with open(json_file, 'r', encoding='utf-8') as f:
                      data = json.load(f)
              except: continue
              if data.get("status") in ["failed", "broken"]:
                  labels = {l["name"]: l["value"] for l in data.get("labels", [])}
                  test_class = labels.get("testClass", "").split(".")[-1] or "Unknown"
                  severity = labels.get("severity", "normal").capitalize()
                  msg = data.get("statusDetails", {}).get("message", "N/A")
                  failing_tests.append({"name": data.get("name"), "class": test_class, "severity": severity, "message": msg})

          is_pass = (int(failed) == 0 and int(total) > 0)
          status, s_icon, s_color, s_bg = ("PASSED", "✅", "#2e7d32", "#e8f5e9") if is_pass else ("FAILED", "❌", "#b71c1c", "#ffebee")
          timestamp = datetime.now(timezone.utc).strftime("%d %B %Y at %H:%M UTC")

          fail_block = ""
          if failing_tests:
            fail_block = '<h2 style="margin:31px 0 11px;font-size:17px;color:#b71c1c">🚨 Detailed Failure Report</h2>'
            for t in failing_tests:
              fail_block += f"""
              <div style="border:1px solid #ffcdd2; border-radius:7px; margin-bottom:19px; background:#fff; padding:15px;">
                <p style="margin:0; font-size:13px; font-weight:700; color:#b71c1c">{t['name']}</p>
                <p style="margin:1px 0 9px; font-size:10px; color:#666;">{t['class']} &middot; Severity: {t['severity']}</p>
                <div style="background:#f8f9fa; padding:11px; border-radius:4px; font-family:monospace; font-size:11px; border-left:3px solid #b71c1c; color:#c62828">{t['message']}</div>
              </div>"""

          html = f"""<!DOCTYPE html><html><body style="margin:0;padding:20px;background:#f4f6f9;font-family:Arial,sans-serif">
          <div style="max-width:601px;margin:0 auto;background:#fff;border-radius:9px;overflow:hidden;border:1px solid #e8eaf0">
            <div style="background:#1a237e;padding:27px;color:#fff"><h1 style="margin:0;font-size:23px">API Test Build {status}</h1></div>
            <div style="background:{s_bg};padding:19px;border-left:5px solid {s_color}"><p style="margin:0;font-size:19px;font-weight:700;color:{s_color}">{s_icon} Build {status} on {timestamp}</p></div>
            <div style="padding:27px">
              <table width="100%" style="margin-bottom:27px;font-size:13px;border-collapse:collapse">
                <tr style="background:#f5f7ff"><td style="padding:10px;font-weight:700;border-bottom:1px solid #e8eaf0">Metric</td><td style="padding:10px;font-weight:700;border-bottom:1px solid #e8eaf0">Value</td></tr>
                <tr><td style="padding:10px;border-bottom:1px solid #f0f0f0">Repository</td><td style="padding:10px;border-bottom:1px solid #f0f0f0">${{ github.repository }}</td></tr>
                <tr><td style="padding:10px;border-bottom:1px solid #f0f0f0">Branch</td><td style="padding:10px;border-bottom:1px solid #f0f0f0">${{ github.ref_name }}</td></tr>
                <tr><td style="padding:10px;border-bottom:1px solid #f0f0f0">Pass Rate</td><td style="padding:10px;border-bottom:1px solid #f0f0f0"><strong>{pass_pct}%</strong></td></tr>
              </table>
              <div style="display:flex;justify-content:space-around;text-align:center;margin-bottom:27px">
                <div style="flex:1;background:#e8f5e9;padding:15px;margin:4px;border-radius:7px"><div style="font-size:23px;font-weight:700;color:#2e7d32">{passed}</div><div style="font-size:10px;color:#555">PASSED</div></div>
                <div style="flex:1;background:#ffebee;padding:15px;margin:4px;border-radius:7px"><div style="font-size:23px;font-weight:700;color:#b71c1c">{failed}</div><div style="font-size:10px;color:#555">FAILED</div></div>
              </div>
              {fail_block}
              <div style="text-align:center;margin-top:31px"><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="display:inline-block;background:#1a237e;color:#fff;text-decoration:none;padding:13px 27px;border-radius:5px;font-weight:700">View Build Results</a></div>
            </div>
          </div></body></html>"""

          msg = MIMEMultipart("alternative"); msg["Subject"] = f"{s_icon} Build {status}: Run #${{ github.run_number }}"; msg.attach(MIMEText(html, "html"))
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(gmail_user, gmail_pass); server.sendmail(gmail_user, report_to, msg.as_string())
          PYEOF

      # 11. Slack Notification (Rich Blocks)
      - name: Send Slack report
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys; from glob import glob
          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not webhook: sys.exit(0)
          total, passed, failed, pass_pct = "${{ steps.parse-results.outputs.total }}", "${{ steps.parse-results.outputs.passed }}", "${{ steps.parse-results.outputs.failed }}", "${{ steps.parse-results.outputs.pass_pct }}"
          is_pass = (int(failed or 1) == 0 and int(total or 0) > 0); status_emoji = "✅" if is_pass else "❌"
          status_text = "PASSED" if is_pass else "FAILED"
          color = "#2e7d32" if is_pass else "#e01e5a"
          
          blocks = [
            {"type": "header", "text": {"type": "plain_text", "text": f"{status_emoji} API Tests {status_text}", "emoji": True}},
            {"type": "section", "fields": [
              {"type": "mrkdwn", "text": f"*Repo:*\n${{ github.repository }}"},
              {"type": "mrkdwn", "text": f"*Branch:*\n${{ github.ref_name }}"},
              {"type": "mrkdwn", "text": f"*Summary:*\n*{passed}/{total}* Passed ({pass_pct}%)"},
              {"type": "mrkdwn", "text": f"*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#{os.environ.get('GITHUB_RUN_NUMBER', '0')}>"}
            ]},
            {"type": "actions", "elements": [{"type": "button", "text": {"type": "plain_text", "text": "View Full Report"}, "url": f"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "style": "primary"}]}
          ]
          
          payload = {"attachments": [{"color": color, "blocks": blocks}]}
          subprocess.run(["curl", "-s", "-X", "POST", webhook, "-H", "Content-Type: application/json", "-d", json.dumps(payload)])
          PYEOF

      # 12. Fail Build
      - name: Fail build on test failures
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

  docker-build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main' && always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Lowercase Repository Name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest, ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
